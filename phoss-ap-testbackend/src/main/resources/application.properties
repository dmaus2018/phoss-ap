spring.application.name=phoss-ap-testbackend

# === Web server ===
server.port=8888

# === phoss-ap callback target ===
# Base URL of the running phoss-ap instance for async callbacks
testbackend.phossap.base-url=http://localhost:8080

# === HTTP forwarding receiver ===
# Default C4 country code returned in sync mode
testbackend.http.default-country-code=AT

# === Embedded SFTP server ===
testbackend.sftp.enabled=false
testbackend.sftp.port=2222
testbackend.sftp.user=testuser
testbackend.sftp.password=testpass
testbackend.sftp.host-key-file=generated/hostkey.ser

# === S3 / Directory polling ===
testbackend.s3poll.enabled=false
# Directory to poll for files (e.g. a MinIO data directory or local mount)
testbackend.s3poll.directory=generated/s3-inbox/
testbackend.s3poll.interval-ms=5000

# === Document storage ===
# Base directory for all received documents
testbackend.storage.base-dir=generated/received/

# === Spring Boot ===
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# === Actuator ===
management.endpoints.web.exposure.include=health,info
