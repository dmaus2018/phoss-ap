# In-memory H2 configuration for webapp unit tests
phossap.jdbc.database-type=h2
phossap.jdbc.driver=org.h2.Driver
phossap.jdbc.url=jdbc:h2:mem:phoss_ap_test;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
phossap.jdbc.user=sa
phossap.jdbc.password=
phossap.jdbc.schema=ap_test

phossap.flyway.enabled=true
phossap.flyway.jdbc.schema-create=true

# Disable external reporting DB connections during unit test
peppol.reporting.jdbc.database-type=postgresql
peppol.reporting.flyway.enabled=false
peppol.report.jdbc.database-type=postgresql
peppol.report.flyway.enabled=false

org.apache.wss4j.crypto.merlin.keystore.type=jks
org.apache.wss4j.crypto.merlin.keystore.file=ap2026testg3.jks
org.apache.wss4j.crypto.merlin.keystore.password=m@nage
org.apache.wss4j.crypto.merlin.keystore.alias=apcert
org.apache.wss4j.crypto.merlin.keystore.private.password=m@nage

org.apache.wss4j.crypto.merlin.truststore.type=pkcs12
org.apache.wss4j.crypto.merlin.truststore.file=truststore/2025/ap-test-truststore.p12
org.apache.wss4j.crypto.merlin.truststore.password=peppol
