# This Docker compose file starts up a local database instance for AP building
# Run like this:
# docker compose -f unittest-db-docker-compose.yml up
# docker compose -f unittest-db-docker-compose.yml down
services:
  postgres:
    image: postgres:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: phoss-ap
      POSTGRES_USER: peppol
      POSTGRES_PASSWORD: peppol
    volumes:
      - pg18data:/var/lib/postgresql

#  pg-adminer:
#    image: adminer
#    restart: always
#    ports:
#      - 8080:8080
      
  mysql:
    image: mysql:8.4
    command: >
      --plugin-load-add=mysql_native_password.so
      --mysql-native-password=FORCE_PLUS_PERMANENT
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: peppol
      MYSQL_DATABASE: phoss-ap
      MYSQL_USER: peppol
      MYSQL_PASSWORD: peppol
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  pg18data:
  mysqldata:
